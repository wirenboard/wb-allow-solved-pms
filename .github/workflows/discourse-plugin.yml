name: Discourse Plugin

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    # Two cores, two different questions. Testing only one of them answers neither
    # reliably: a red run on a core the portals do not run may only mean "will break
    # on upgrade", and a green one on a newer core says nothing about the deployed
    # version. Proven here: the _map spec fixed in 28b1bd5 was red on the dev tip and
    # green on 2026.4.0, because core changed how group_list settings normalise on
    # assignment.
    #
    #   release/2026.4 -- the line the portals are installed on today (2026.4.x).
    #                     Bump this when they are upgraded.
    #   beta           -- a TAG Discourse moves with each release (2026.6.0 right now).
    #                     It is exactly what `version: beta` in the portals' app.yml
    #                     checks out, so this leg always tests what the next rebuild
    #                     would actually deploy. Self-updating: no maintenance.
    #
    # Note on names: `beta` and `stable` are tags, not branches -- Discourse retired
    # those branch names. `latest`, `main` and `tests-passed` are all the same dev tip
    # (2026.7.0 today), which is further out than anything the portals will run soon.
    name: ci (${{ matrix.core_ref }})
    strategy:
      fail-fast: false # one core failing must not cancel the other
      matrix:
        core_ref:
          - release/2026.4 # installed now
          - beta # what the next rebuild brings
    uses: discourse/.github/.github/workflows/discourse-plugin.yml@v1
    with:
      core_ref: ${{ matrix.core_ref }}
      # Ruby-only plugin: there is no package.json / .eslintrc / .prettierrc, and no
      # .rubocop.yml inheriting from core, so the linting job has nothing to lint and
      # would fail on the missing configs. Drop this once those configs are added.
      skip_linting: true
