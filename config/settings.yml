plugins:
  solved_pm_enabled:
    default: false
    client: false

  # Group inboxes whose messages are eligible for Solved.
  # Discourse stores group_list settings as pipe-delimited group **ids** ("44|45"),
  # so the default must be empty -- a group name here ends up stored verbatim and
  # then resolves to nothing (or, via SiteSetting#..._map, to group 0 = everyone).
  solved_pm_target_groups:
    type: group_list
    default: ""
    client: false

  # Extra groups allowed to mark solutions in eligible PMs. Staff always may.
  solved_pm_actor_groups:
    type: group_list
    default: ""
    client: false

  # Allow the PM topic owner (often the customer) to mark a solution.
  solved_pm_allow_topic_owner:
    default: true
    client: false

  # Allow Solved in personal (non-group) 1:1 PMs. Independent of solved_pm_target_groups.
  solved_pm_allow_personal_messages:
    default: false
    client: false
